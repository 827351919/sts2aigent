# STS2 AI Agent 配置文件 - Phase 1 最小闭环

# MCP Server 配置 (STS2MCP HTTP API)
mcp:
  host: "localhost"
  port: 15526
  timeout: 10
  reconnect_attempts: 3

# Agent 配置
agent:
  # 运行模式: full_auto | semi_auto | assist | simulation
  mode: "full_auto"

  # 轮询间隔 (毫秒)
  poll_interval_ms: 500

  # 决策超时 (秒)
  decision_timeout: 30

  # 是否启用知识库 (Phase 1 暂不使用)
  enable_knowledge: false

  # 是否记录决策过程
  log_decisions: true

  # 决策历史最大条数
  max_decision_history: 100

# 日志配置
logging:
  level: "INFO"  # DEBUG | INFO | WARNING | ERROR
  file: "logs/agent.log"
  max_size_mb: 100
  backup_count: 5
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
